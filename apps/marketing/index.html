    <div id="root"></div>
    <noscript>
      <h1>botttle — Self-Hosted Client Portal</h1>
      <p>botttle is the open-source, self-hosted client portal for freelancers and small teams. Manage projects, milestones, invoices, time tracking, and client collaboration from your own server. Deploy with Docker in minutes.</p>
      <h2>Features</h2>
      <ul>
        <li>Project management with milestones, tasks, and automatic completion tracking</li>
        <li>Invoicing with line items, multi-currency, tax rates, and PDF export</li>
        <li>Time tracking with start/stop timers, billable hours, and CSV export</li>
        <li>Client portal with role-based access — admins and clients see only their data</li>
        <li>Comments and file uploads scoped to each project</li>
        <li>Lemon Squeezy webhook integration for automatic payment capture</li>
        <li>Self-hosted deployment with Docker Compose (PostgreSQL, Redis, API, Web UI)</li>
      </ul>
      <p>Built with Fastify, React, PostgreSQL, Prisma, and Bun. <a href="https://github.com/growvth/botttle">View on GitHub</a>.</p>
    </noscript>
