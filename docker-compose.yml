services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botttle
      POSTGRES_PASSWORD: botttle
      POSTGRES_DB: botttle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port (default 5432). Set POSTGRES_PUBLISH_PORT in a repo-root `.env` for docker compose, e.g. 5433 if 5432 is already in use.
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botttle -d botttle"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://botttle:botttle@postgres:5432/botttle
      HOST: 0.0.0.0
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-hex-32-in-production}
      REFRESH_SECRET: ${REFRESH_SECRET:-change-me-use-openssl-rand-hex-32-in-production}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      FILE_STORAGE: ${FILE_STORAGE:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY:-}
      LEMONSQUEEZY_DEFAULT_VARIANT_ID: ${LEMONSQUEEZY_DEFAULT_VARIANT_ID:-}
    ports:
      - "3001:3001"
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    entrypoint: ["bun", "apps/api/dist/worker.js"]
    environment:
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_uploads:
